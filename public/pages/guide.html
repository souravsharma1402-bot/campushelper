<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CampusNavigator Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Inter', sans-serif; background:#0b1324; }
.font-headline { font-family: 'Space Grotesk'; }
.glass-panel { background: rgba(19,27,44,0.6); backdrop-filter: blur(20px); }
</style>
</head>

<body class="text-white min-h-screen">

<!-- 🔐 AUTH -->
<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user){ window.location.href="index.html"; } // ✅ FIXED
</script>

<!-- TOP BAR -->
<header class="fixed top-0 w-full flex justify-between items-center px-8 h-16 bg-[#0b1324]/80 backdrop-blur-xl">
    <div class="text-xl font-bold text-blue-300">CampusNavigator</div>

    <div class="flex items-center gap-4">
        <span id="topUser" class="text-sm text-gray-300"></span>
        <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">Logout</button>
    </div>
</header>

<!-- SIDEBAR -->
<aside class="fixed left-0 top-16 bottom-0 w-64 bg-[#060e1e] p-6 hidden md:flex flex-col">

    <h2 class="text-blue-300 font-bold mb-6">Navigator</h2>

    <a href="dashboard.html" class="mb-2 text-blue-300">Dashboard</a>
    <a href="guide.html" class="mb-2 text-white">Guide</a>
    <a href="forum.html" class="mb-2 text-gray-400">Forum</a>
    <a href="notifications.html" class="mb-2 text-gray-400">Notifications</a>

    <div class="mt-auto">
        <p id="guideUserName"></p>
        <p id="guideUserId" class="text-gray-500 text-sm"></p>
    </div>

</aside>

<!-- MAIN -->
<main class="pt-24 md:pl-72 px-6">

<h1 class="text-4xl font-bold mb-10">Operational Guide</h1>

<div class="grid md:grid-cols-3 gap-6">

<div class="glass-panel p-6 rounded">
    <h3 class="text-xl mb-2">Central Reception</h3>
    <p class="text-gray-400 mb-4">Main entry point</p>
    <button onclick="goToMap('reception')" class="bg-blue-500 px-4 py-2 rounded">
        View Path
    </button>
</div>

<div class="glass-panel p-6 rounded">
    <h3 class="text-xl mb-2">Library</h3>
    <p class="text-gray-400 mb-4">Knowledge hub</p>
    <button onclick="goToMap('library')" class="bg-blue-500 px-4 py-2 rounded">
        View Path
    </button>
</div>

<div class="glass-panel p-6 rounded">
    <h3 class="text-xl mb-2">Science Block</h3>
    <p class="text-gray-400 mb-4">Labs & research</p>
    <button onclick="goToMap('science')" class="bg-blue-500 px-4 py-2 rounded">
        View Path
    </button>
</div>

</div>

</main>

<script>

// 👤 USER DATA
document.getElementById("guideUserName").innerText = user.userId;
document.getElementById("guideUserId").innerText = "ID: " + user.userId;
document.getElementById("topUser").innerText = user.userId;

// 🚪 LOGOUT
function logout(){
    localStorage.removeItem("user");
    window.location.href="index.html"; // ✅ FIXED
}

// 🧭 MAP CONNECTION
function goToMap(location){
    localStorage.setItem("mapTarget", location);
    window.location.href="map.html"; // ✅ FIXED
}

</script>

</body>
</html>
