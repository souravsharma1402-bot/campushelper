<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CampusNavigator Forum</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b1324] text-white">

<script>
// 🔐 AUTH
const user = JSON.parse(localStorage.getItem("user"));
if(!user) window.location.href="index.html";

// 🌐 BASE URL
const BASE_URL = "https://campus-navigator-vtx6.onrender.com";
</script>

<!-- NAV -->
<div class="p-4 flex gap-6 bg-black">
<a href="dashboard.html">Dashboard</a>
<a href="guide.html">Guide</a>
<a href="teachers.html">Teachers</a>
<a href="forum.html" class="text-blue-400">Forum</a>
</div>

<!-- CREATE POST -->
<div class="p-6">
<textarea id="postText" class="w-full p-3 bg-gray-800 rounded" placeholder="Write something..."></textarea>

<input type="file" id="imageInput" class="mt-3">

<button onclick="createPost()" class="mt-3 bg-blue-500 px-4 py-2 rounded">
Post
</button>
</div>

<!-- POSTS -->
<div id="posts" class="p-6 space-y-6"></div>

<script>

// 📝 CREATE POST
async function createPost(){
    const text = document.getElementById("postText").value;
    const file = document.getElementById("imageInput").files[0];

    let image = "";

    if(file){
        const reader = new FileReader();
        reader.onload = async ()=>{
            image = reader.result;
            await sendPost(text,image);
        };
        reader.readAsDataURL(file);
    } else {
        await sendPost(text,"");
    }
}

// 📤 SEND POST
async function sendPost(text,image){
    await fetch(BASE_URL + "/createPost",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            userId:user.userId,
            text,
            image
        })
    });
}

// 📥 LOAD POSTS
async function loadPosts(){
    const res = await fetch(BASE_URL + "/getPosts");
    const data = await res.json();

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(p=>{
        container.innerHTML += `
        <div class="bg-gray-800 p-4 rounded">
            <h3 class="font-bold">${p.userId}</h3>
            <p>${p.text}</p>

            ${p.image ? `<img src="${p.image}" class="mt-2 rounded">` : ""}

            <div class="flex gap-4 mt-3">
                <button onclick="likePost(${p.id})">❤️ ${p.likes}</button>
            </div>

            <div class="mt-3">
                <input id="c${p.id}" placeholder="comment..." class="p-1 bg-gray-700 rounded">
                <button onclick="commentPost(${p.id})">Send</button>
            </div>

            <div class="mt-2">
                ${p.comments.map(c=>`<p><b>${c.userId}:</b> ${c.comment}</p>`).join("")}
            </div>
        </div>
        `;
    });
}

// ❤️ LIKE
async function likePost(id){
    await fetch(BASE_URL + "/likePost",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    });
}

// 💬 COMMENT
async function commentPost(id){
    const input = document.getElementById("c"+id);
    const comment = input.value;

    await fetch(BASE_URL + "/commentPost",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            id,
            userId:user.userId,
            comment
        })
    });

    input.value="";
}

// 🔁 AUTO REFRESH
setInterval(loadPosts,2000);

// 🚀 INITIAL LOAD
loadPosts();

</script>

</body>
</html>
