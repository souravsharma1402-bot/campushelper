<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CampusNavigator - Teachers</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter&family=Space+Grotesk&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; background:#0b1324; }
.font-headline { font-family: 'Space Grotesk'; }
</style>
</head>

<body class="text-white min-h-screen">

<!-- 🔐 AUTH CHECK -->
<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user){ window.location.href="index.html"; } // ✅ FIXED
</script>

<!-- SIDEBAR -->
<aside class="fixed left-0 top-0 h-screen w-64 bg-[#060e1e] p-6 flex flex-col">

<h1 class="text-blue-400 font-bold mb-6">CampusNavigator</h1>

<a href="dashboard.html" class="mb-2 text-gray-400">Dashboard</a>
<a href="guide.html" class="mb-2 text-gray-400">Guide</a>
<a href="teachers.html" class="mb-2 text-blue-300">Teachers</a>
<a href="forum.html" class="mb-2 text-gray-400">Forum</a>

<div class="mt-auto">
    <p id="userName"></p>
    <p id="userId" class="text-sm text-gray-500"></p>
    <button onclick="logout()" class="mt-3 bg-red-500 px-3 py-1 rounded text-sm">Logout</button>
</div>

</aside>

<!-- MAIN -->
<main class="ml-64 p-10">

<h1 class="text-3xl font-bold mb-10">Faculty Directory</h1>

<div class="grid md:grid-cols-3 gap-6">

<div class="bg-[#131b2c] p-6 rounded-xl">
    <h3 class="text-lg font-bold">Xenon Malek</h3>
    <p class="text-sm text-blue-300">Bio-Digital Synthesis</p>
    <p class="text-sm text-green-400 mt-2">Available</p>

    <div class="mt-4 flex gap-2">
        <button onclick="messageTeacher('Xenon Malek')" class="bg-blue-500 px-3 py-1 rounded">
            Message
        </button>
        <button onclick="viewBio('Xenon Malek')" class="bg-gray-700 px-3 py-1 rounded">
            Bio
        </button>
    </div>
</div>

<div class="bg-[#131b2c] p-6 rounded-xl">
    <h3 class="text-lg font-bold">Lyra Solstice</h3>
    <p class="text-sm text-blue-300">Atmospheric Engineering</p>
    <p class="text-sm text-red-400 mt-2">Busy</p>

    <div class="mt-4 flex gap-2">
        <button onclick="messageTeacher('Lyra Solstice')" class="bg-blue-500 px-3 py-1 rounded">
            Message
        </button>
        <button onclick="viewBio('Lyra Solstice')" class="bg-gray-700 px-3 py-1 rounded">
            Bio
        </button>
    </div>
</div>

<div class="bg-[#131b2c] p-6 rounded-xl">
    <h3 class="text-lg font-bold">Cyrus Voss</h3>
    <p class="text-sm text-blue-300">Neural Kinematics</p>
    <p class="text-sm text-gray-400 mt-2">Offline</p>

    <div class="mt-4 flex gap-2">
        <button onclick="messageTeacher('Cyrus Voss')" class="bg-blue-500 px-3 py-1 rounded">
            Message
        </button>
        <button onclick="viewBio('Cyrus Voss')" class="bg-gray-700 px-3 py-1 rounded">
            Bio
        </button>
    </div>
</div>

</div>

</main>

<script>

// 👤 USER DATA
document.getElementById("userName").innerText = user.userId;
document.getElementById("userId").innerText = "ID: " + user.userId;

// 🚪 LOGOUT
function logout(){
    localStorage.removeItem("user");
    window.location.href="index.html"; // ✅ FIXED
}

// 💬 MESSAGE SYSTEM
function messageTeacher(name){
    localStorage.setItem("chatTarget", name);
    window.location.href="forum.html"; // ✅ FIXED
}

// 📄 VIEW BIO
function viewBio(name){
    alert("Viewing profile of " + name);
}

</script>

</body>
</html>
