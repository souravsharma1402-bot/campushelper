<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CampusNavigator Dashboard</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; background-color: #0b1324; }
.font-headline { font-family: 'Space Grotesk', sans-serif; }
.grid-mesh {
    background-image: linear-gradient(rgba(51, 102, 204, 0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(51, 102, 204, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
}
</style>
</head>

<body class="bg-[#0b1324] text-white min-h-screen overflow-x-hidden grid-mesh">

<!-- Sidebar -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-[#060e1e] flex flex-col py-8 shadow-2xl z-50 hidden md:flex">
<div class="px-6 mb-12">
<h1 class="text-[#b1c5ff] font-black font-headline tracking-widest text-xl">CampusNavigator</h1>
<p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mt-1">University Systems</p>
</div>

<nav class="flex-grow flex flex-col">

<a href="guide.html" class="text-[#b1c5ff] bg-[#3366cc]/20 rounded-r-full py-3 px-6 border-l-4 border-[#b1c5ff] flex items-center gap-4">
<span class="material-symbols-outlined">explore</span> Guide
</a>

<a href="teachers.html" class="text-slate-400 py-3 px-6 hover:text-white flex items-center gap-4">
<span class="material-symbols-outlined">school</span> Teachers
</a>

<a href="forum.html" class="text-slate-400 py-3 px-6 hover:text-white flex items-center gap-4">
<span class="material-symbols-outlined">forum</span> Forum
</a>

</nav>

<div class="px-6 mt-auto">
<button onclick="logout()" class="w-full bg-red-500 py-3 rounded font-bold">
Logout
</button>
</div>
</aside>

<!-- Top Bar -->
<header class="fixed top-0 w-full bg-[#0b1324]/70 backdrop-blur-xl flex justify-between items-center px-6 h-16 md:pl-72">
<div class="font-headline text-xl font-bold text-[#b1c5ff]">Dashboard</div>
<div class="flex items-center gap-4">
<span id="topUsername" class="text-sm text-gray-300"></span>
</div>
</header>

<!-- Main -->
<main class="pt-24 md:pl-72 px-6">

<div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">

<!-- Profile Card -->
<div class="bg-[#131b2c] p-8 rounded-xl border border-gray-700 text-center">
<h2 id="usernameDisplay" class="text-3xl font-bold mb-2">Loading...</h2>
<p class="text-gray-400">Welcome back</p>
</div>

<!-- Quick Actions -->
<div class="bg-[#131b2c] p-8 rounded-xl border border-gray-700">
<h3 class="text-lg mb-4">Quick Access</h3>

<div class="grid grid-cols-3 gap-4">

<a href="guide.html" class="bg-blue-500 p-4 rounded text-center">Guide</a>
<a href="teachers.html" class="bg-green-500 p-4 rounded text-center">Teachers</a>
<a href="forum.html" class="bg-purple-500 p-4 rounded text-center">Forum</a>

</div>

</div>

</div>

</main>

<script>

// 🔐 AUTH CHECK
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location.href = "index.html";
}

// 👤 USERNAME SET
const username = user.userId || user.name || "User";

document.getElementById("usernameDisplay").innerText = username;
document.getElementById("topUsername").innerText = username;

// 🚪 LOGOUT
function logout(){
    localStorage.removeItem("user");
    window.location.href = "index.html";
}

</script>

</body>
</html>
