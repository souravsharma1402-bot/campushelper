<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus Helper - Teachers</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Inter', sans-serif; background:#0b1324; }
</style>
</head>

<body class="text-white min-h-screen">

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user){ window.location.href="index.html"; }
</script>

<!-- SIDEBAR -->
<aside class="fixed left-0 top-0 h-screen w-64 bg-[#060e1e] p-6 flex flex-col">
<h1 class="text-blue-400 font-bold mb-6">CampusNavigator</h1>

<a href="dashboard.html" class="mb-2 text-gray-400">Dashboard</a>
<a href="guide.html" class="mb-2 text-gray-400">Guide</a>
<a href="teachers.html" class="mb-2 text-blue-300">Teachers</a>
<a href="forum.html" class="mb-2 text-gray-400">Forum</a>

<div class="mt-auto">
    <p id="userName"></p>
    <p id="userId" class="text-sm text-gray-500"></p>
    <button onclick="logout()" class="mt-3 bg-red-500 px-3 py-1 rounded text-sm">Logout</button>
</div>
</aside>

<!-- MAIN -->
<main class="ml-64 p-10">

<h1 class="text-3xl font-bold mb-6">Faculty Directory</h1>

<div class="flex gap-4 mb-8 flex-wrap">

<input id="searchInput" placeholder="Search teacher..."
class="p-2 bg-gray-800 border border-gray-600 rounded w-60">

<select id="dayFilter" class="p-2 bg-gray-800 border border-gray-600 rounded">
<option value="">All Days</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
</select>

<select id="timeFilter" class="p-2 bg-gray-800 border border-gray-600 rounded">
<option value="">All Time</option>
<option value="9-10">9:30–10:20</option>
<option value="10-11">10:20–11:10</option>
<option value="11-12">11:20–12:10</option>
<option value="12-1">12:10–1:00</option>
<option value="1-2">1:05–1:55</option>
<option value="2-3">1:55–2:45</option>
<option value="3-4">2:45–3:35</option>
</select>

</div>

<div id="teacherList" class="grid md:grid-cols-3 gap-6"></div>

</main>

<script>

// USER
document.getElementById("userName").innerText = user.userId;
document.getElementById("userId").innerText = "ID: " + user.userId;

// REAL TIMETABLE
const timetable = {

"Vishal Dhiman": {
  Monday: {"9-10":"Class","11-12":"Class"},
  Tuesday: {"9-10":"Class","1-2":"Class"},
  Wednesday: {"9-10":"Class","1-2":"Class"},
  Thursday: {"9-10":"Class","10-11":"Class","11-12":"Class","3-4":"Class"},
  Friday: {"11-12":"Class","3-4":"Class"}
},

"Dr. Manoj Wadhwa": {
  Monday: {"10-11":"Class","11-12":"Class"},
  Tuesday: {"9-10":"Class","11-12":"Class","3-4":"Class"},
  Wednesday: {"9-10":"Class","3-4":"Class"},
  Thursday: {"2-3":"Class"},
  Friday: {"11-12":"Class","1-2":"Class"}
},

"Madhu Sharma": {
  Monday: {"9-10":"Class","11-12":"Class"},
  Tuesday: {"9-10":"Class","1-2":"Class","3-4":"Class"},
  Wednesday: {"9-10":"Class","1-2":"Class","3-4":"Class"},
  Thursday: {"11-12":"Class","3-4":"Class"},
  Friday: {"10-11":"Class","3-4":"Class"}
},

"Ritik Bhardwaj": {
  Monday: {"9-10":"Class","11-12":"Class"},
  Tuesday: {"10-11":"Class","1-2":"Class","3-4":"Class"},
  Wednesday: {"9-10":"Class","11-12":"Class"},
  Thursday: {"1-2":"Class","3-4":"Class"},
  Friday: {"11-12":"Class","1-2":"Class","3-4":"Class"}
}

};

// TEACHERS
const teachers = Object.keys(timetable).map(name => ({ name }));

// TIME
function getCurrentSlot(){
  const h = new Date().getHours();
  if(h>=9 && h<10) return "9-10";
  if(h>=10 && h<11) return "10-11";
  if(h>=11 && h<12) return "11-12";
  if(h>=12 && h<13) return "12-1";
  if(h>=13 && h<14) return "1-2";
  if(h>=14 && h<15) return "2-3";
  if(h>=15 && h<16) return "3-4";
  return null;
}

// DAY
function getCurrentDay(){
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];
}

// STATUS
function getStatus(name){
  const day = getCurrentDay();
  const slot = getCurrentSlot();

  if(!slot) return "Offline";

  const slots = timetable[name][day] || {};
  return slots[slot] === "Class" ? "Busy" : "Available";
}

// RENDER
function render(list){
  const container = document.getElementById("teacherList");

  container.innerHTML = list.map(t => {
    const status = getStatus(t.name);

    return `
    <div class="bg-[#131b2c] p-6 rounded-xl">
      <h3 class="text-lg font-bold">${t.name}</h3>

      <p class="mt-2 ${
        status==="Available"?"text-green-400":
        status==="Busy"?"text-red-400":"text-gray-400"
      }">${status}</p>

      <div class="mt-4">
        <button onclick="messageTeacher('${t.name}')" class="bg-blue-500 px-3 py-1 rounded">
          Message
        </button>
      </div>
    </div>
    `;
  }).join("");
}

// FILTER
function applyFilters(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  const day = document.getElementById("dayFilter").value || getCurrentDay();
  const time = document.getElementById("timeFilter").value;

  const filtered = teachers.filter(t => {
    const matchName = t.name.toLowerCase().includes(search);
    const slots = timetable[t.name][day] || {};
    const matchTime = time ? !slots[time] : true;
    return matchName && matchTime;
  });

  render(filtered);
}

// EVENTS
document.getElementById("searchInput").addEventListener("input", applyFilters);
document.getElementById("dayFilter").addEventListener("change", applyFilters);
document.getElementById("timeFilter").addEventListener("change", applyFilters);

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}

// MESSAGE
function messageTeacher(name){
  localStorage.setItem("chatTarget", name);
  window.location.href="forum.html";
}

// INIT
render(teachers);

</script>

</body>
</html>
